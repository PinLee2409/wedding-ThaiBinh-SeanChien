<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1B2A4A" />

    <!-- Primary meta -->
    <title>Flight to Forever · Thiệp cưới</title>
    <meta
      name="description"
      content="Flight to Forever — Thiệp mời cưới trực tuyến theo chủ đề hàng không. Cùng lên chuyến bay hạnh phúc của chúng mình."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Flight to Forever · Save the Date" />
    <meta
      property="og:description"
      content="Trân trọng kính mời bạn đến chung vui trong ngày trọng đại. Cùng lên chuyến bay hạnh phúc của chúng mình."
    />
    <meta property="og:image" content="images/og-cover.jpg" />
    <meta property="og:image:alt" content="Boarding pass wedding invitation — Flight to Forever" />
    <meta property="og:locale" content="vi_VN" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Flight to Forever · Save the Date" />
    <meta
      name="twitter:description"
      content="Thiệp mời cưới trực tuyến — Cùng lên chuyến bay hạnh phúc của chúng mình."
    />
    <meta name="twitter:image" content="images/og-cover.jpg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- crossorigin makes the stylesheet's cssRules readable so the boarding
         pass PNG/PDF export can embed the fonts (Google Fonts sends ACAO). -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Great+Vibes&family=Montserrat:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="src/main.tsx"></script>
  </body>
</html>
